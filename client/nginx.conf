# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for QuickKart Client SPA
# INT377 DevOps Project — Phase 2: Docker
#
# Key features:
#   - try_files fallback: returns index.html for ALL routes so React Router works
#   - gzip compression: ~70% smaller response payloads
#   - Cache headers: static assets cached 1 year, HTML always revalidated
#   - Security headers: XSS protection, content type sniffing prevention
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static Assets — aggressive caching ───────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA Routing — return index.html for all routes ────────────────
    # This is the critical line that makes React Router work in production.
    # Without it, navigating directly to /products/123 returns 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Error Pages ───────────────────────────────────────────────────
    error_page 404 /index.html;
}
